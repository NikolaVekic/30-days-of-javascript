<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Content Loader</title>
  </head>
  <body>
    <div class="card">
      <div class="card-header animated-bg" id="header"></div>
      <div class="card-content">
        <h3 id="title" class="card-title animated-bg animated-bg-text"></h3>
        <p id="excerpt" class="card-excerpt animated-bg animated-bg-text"></p>
        <div class="author">
          <div class="profile-img animated-bg" id="profile_img"></div>
          <div class="author-info">
            <strong id="name" class="animated-bg animated-bg-text"></strong>
            <small id="date" class="animated-bg animated-bg-text"></small>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
